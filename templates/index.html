<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Turnover Analysis</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Employee Turnover Analysis Dashboard</h1>
    
    <section id="feature-importance">
        <h2>Main Reasons for Leaving</h2>
        <canvas id="featureChart"></canvas>
    </section>
    
    <section id="top-risk">
        <h2>Top 10 Employees at Risk</h2>
        <table id="riskTable">
            <thead>
                <tr>
                    <th>Employee Name</th>
                    <th>Department</th>
                    <th>Position</th>
                    <th>Risk of Leaving</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </section>
    
    <div id="employeeModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="employeeName"></h2>
            <canvas id="comparisonChart"></canvas>
            <table id="comparisonTable">
                <thead>
                    <tr>
                        <th>Variable</th>
                        <th>Employee Value</th>
                        <th>Average</th>
                        <th>Difference (%)</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
